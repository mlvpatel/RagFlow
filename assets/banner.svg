<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="RagChatBot, Naive RAG">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="ac" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#93c5fd"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="360" rx="18" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="1197" height="357" rx="17" fill="none" stroke="#60a5fa" stroke-opacity="0.25" stroke-width="3"/>

  <!-- title block -->
  <rect x="64" y="74" width="56" height="10" rx="5" fill="url(#ac)"/>
  <text x="64" y="146" font-family="Helvetica, Arial, sans-serif" font-size="64" font-weight="700" fill="#f8fafc">RagChatBot</text>
  <text x="64" y="196" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="600" fill="#60a5fa">Naive RAG</text>
  <text x="64" y="232" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#cbd5e1">one dense search, straight to the answer</text>
  <rect x="64" y="258" width="165.0" height="34" rx="17" fill="#f8fafc" fill-opacity="0.08" stroke="#60a5fa" stroke-opacity="0.5"/>
  <text x="146.5" y="281" font-family="ui-monospace, Menlo, monospace" font-size="17" fill="#93c5fd" text-anchor="middle">rag-naive-2022</text>

  <!-- year badge -->
  <rect x="1066" y="34" width="70" height="32" rx="16" fill="#60a5fa" fill-opacity="0.16" stroke="#60a5fa" stroke-opacity="0.55"/>
  <text x="1101" y="56" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="600" fill="#93c5fd" text-anchor="middle">2022</text>

  <!-- motif -->
  
  <g stroke-linecap="round">
    <rect x="700" y="110" width="110" height="140" rx="10" fill="#f8fafc" fill-opacity="0.07" stroke="#60a5fa" stroke-width="3"/>
    <line x1="722" y1="145" x2="788" y2="145" stroke="#93c5fd" stroke-width="6"/>
    <line x1="722" y1="175" x2="788" y2="175" stroke="#93c5fd" stroke-width="6" opacity="0.7"/>
    <line x1="722" y1="205" x2="766" y2="205" stroke="#93c5fd" stroke-width="6" opacity="0.4"/>
    <line x1="820" y1="180" x2="940" y2="180" stroke="url(#ac)" stroke-width="5"/>
    <polygon points="940,170 962,180 940,190" fill="#93c5fd"/>
    <circle cx="880" cy="180" r="26" fill="none" stroke="#60a5fa" stroke-width="4"/>
    <line x1="898" y1="198" x2="914" y2="214" stroke="#60a5fa" stroke-width="5"/>
    <rect x="975" y="130" width="150" height="86" rx="20" fill="url(#ac)" opacity="0.9"/>
    <polygon points="1000,214 1000,244 1030,214" fill="#60a5fa" opacity="0.9"/>
    <circle cx="1025" cy="173" r="7" fill="#0f172a"/>
    <circle cx="1050" cy="173" r="7" fill="#0f172a"/>
    <circle cx="1075" cy="173" r="7" fill="#0f172a"/>
  </g>

  <!-- corner credit -->
  <text x="1160" y="334" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#94a3b8" text-anchor="end">by <tspan fill="#93c5fd">MlvPtL</tspan></text>
</svg>
