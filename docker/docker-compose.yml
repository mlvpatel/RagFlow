services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - CHROMA_DIR=/app/chroma_db
    volumes:
      - ragflow-data:/app/chroma_db

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: streamlit run frontend/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - ../.env
    environment:
      - RAGFLOW_API_URL=http://api:8000
    depends_on:
      - api

volumes:
  ragflow-data:
